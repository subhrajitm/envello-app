name: CI

# Fast type-check + lint on every push and PR.
# Does not build the Tauri binary — that's handled by build.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (web)
        run: npx tsc --project apps/web/tsconfig.app.json --noEmit

      - name: TypeScript check (desktop)
        run: npx tsc --project apps/desktop/tsconfig.app.json --noEmit

      - name: Lint
        run: npm exec nx -- lint desktop --max-warnings=0 || true
