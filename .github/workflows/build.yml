name: Build

# Runs on every push/PR to main.
# Does NOT create a GitHub Release — uploads platform installers as
# downloadable artifacts (available for 30 days in the Actions tab).
# To publish a release, push a tag: git tag v1.2.3 && git push --tags
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Skip when version-bump.yml just pushed a release commit — release.yml
    # handles the full build for those. Avoids wasting parallel CI minutes.
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
            artifact-name: macos-arm64
          - platform: macos-13
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
            artifact-name: macos-x64
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
            artifact-name: linux
          - platform: windows-2025
            args: ''
            rust-target: ''
            artifact-name: windows-x64
          - platform: windows-2025
            args: '--target aarch64-pc-windows-msvc'
            rust-target: aarch64-pc-windows-msvc
            artifact-name: windows-arm64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.artifact-name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (Nx)
        run: npm exec nx build desktop -- --configuration=production

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifact
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: Envello-${{ matrix.artifact-name }}
          path: src-tauri/target/*/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-2025'
        uses: actions/upload-artifact@v4
        with:
          name: Envello-${{ matrix.artifact-name }}
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: Envello-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
