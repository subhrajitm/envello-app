name: Build

# Runs on every push to main.
# Does NOT create a GitHub Release — just uploads platform installers
# as downloadable artifacts (available for 30 days in the Actions tab).
# To publish a release, push a tag: git tag v1.2.3 && git push --tags
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
            artifact-name: macos-arm64
          - platform: macos-13
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
            artifact-name: macos-x64
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
            artifact-name: linux
          - platform: windows-latest
            args: ''
            rust-target: ''
            artifact-name: windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.artifact-name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (Nx)
        run: npm exec nx build desktop -- --configuration=production

      - name: Build Tauri app (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      # Upload macOS .dmg
      - name: Upload macOS artifact
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: Envello-${{ matrix.artifact-name }}
          path: apps/desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
          retention-days: 30

      # Upload Windows .msi and .exe
      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Envello-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      # Upload Linux .AppImage and .deb
      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: Envello-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
