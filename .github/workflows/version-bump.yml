name: Auto Release

# Runs on every push to main.
# Bumps the patch version across all three version files, commits a
# "chore: release vX.Y.Z" commit, pushes a tag, and the tag then
# triggers release.yml which builds installers for all platforms.
#
# Skip a release by including [skip release] anywhere in the commit message.
on:
  push:
    branches: [main]

jobs:
  bump-and-release:
    if: |
      !contains(github.event.head_commit.message, '[skip release]') &&
      !startsWith(github.event.head_commit.message, 'chore: release v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN so the push triggers downstream workflows (release.yml)
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Configure git bot identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next patch version
        id: version
        run: |
          # Read from tauri.conf.json (authoritative source)
          CURRENT=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          NEXT="$MAJ.$MIN.$((PAT + 1))"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "next=$NEXT"       >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT → $NEXT"

      - name: Update package.json
        run: |
          V=${{ steps.version.outputs.next }}
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '$V';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Update src-tauri/tauri.conf.json
        run: |
          V=${{ steps.version.outputs.next }}
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            p.version = '$V';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Update src-tauri/Cargo.toml
        run: |
          V=${{ steps.version.outputs.next }}
          # Replace the first occurrence of version = "..." in Cargo.toml (the workspace package)
          sed -i "0,/^version = \"[0-9]*\.[0-9]*\.[0-9]*\"/{s//version = \"$V\"/}" src-tauri/Cargo.toml

      - name: Commit and tag
        run: |
          V=${{ steps.version.outputs.next }}
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: release v$V"
          # Annotated tag — required for --follow-tags and best practice for releases
          git tag -a "v$V" -m "Release v$V"

      - name: Push commit and tag
        run: |
          V=${{ steps.version.outputs.next }}
          git push origin main
          # Push the tag explicitly — --follow-tags only works with annotated tags
          # and can be unreliable. An explicit push is always safe.
          git push origin "v$V"

      - name: Trigger release build
        # GITHUB_TOKEN can't trigger other workflows via a push event.
        # Calling release.yml via workflow_dispatch explicitly works around this.
        run: |
          V=${{ steps.version.outputs.next }}
          gh workflow run release.yml --ref "v$V"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
