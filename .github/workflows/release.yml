name: Release

# Triggers:
#   - Push a git tag like "v1.2.3" → creates a GitHub Release with signed installers
#   - Manually via Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # macOS arm64 (Apple Silicon)
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
            artifact-pattern: 'src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg'
            platform-key: darwin-aarch64
            sig-dir: src-tauri/target/aarch64-apple-darwin/release/bundle
            sig-ext: '*.dmg.sig'
          - platform: macos-13            # macOS x64 (Intel)
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
            artifact-pattern: 'src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg'
            platform-key: darwin-x86_64
            sig-dir: src-tauri/target/x86_64-apple-darwin/release/bundle
            sig-ext: '*.dmg.sig'
          - platform: ubuntu-22.04        # Linux .AppImage + .deb
            args: ''
            rust-target: ''
            artifact-pattern: |
              src-tauri/target/release/bundle/**/*.AppImage
              src-tauri/target/release/bundle/**/*.deb
            platform-key: linux-x86_64
            sig-dir: src-tauri/target/release/bundle
            sig-ext: '*.AppImage.sig'
          - platform: windows-2025        # Windows .msi + .exe
            args: ''
            rust-target: ''
            artifact-pattern: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
            platform-key: windows-x86_64
            sig-dir: src-tauri/target/release/bundle/nsis
            sig-ext: '*.exe.sig'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (Nx)
        run: npm exec nx build desktop -- --configuration=production

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Envello ${{ github.ref_name }}'
          body: |
            ## What's new
            See commits for details.

            ## Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `Envello_*_aarch64.dmg` |
            | macOS (Intel) | `Envello_*_x64.dmg` |
            | Windows | `Envello_*_x64-setup.exe` or `.msi` |
            | Linux | `Envello_*_amd64.AppImage` |
          draft: false
          prerelease: false
          files: ${{ matrix.artifact-pattern }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect sig file for update manifest
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/sig"
          SIG=$(find "${{ matrix.sig-dir }}" -name "${{ matrix.sig-ext }}" 2>/dev/null | head -1)
          if [ -n "$SIG" ] && [ -f "$SIG" ]; then
            cp "$SIG" "$RUNNER_TEMP/sig/${{ matrix.platform-key }}.sig"
            basename "$SIG" ".sig" > "$RUNNER_TEMP/sig/${{ matrix.platform-key }}.name"
            echo "Collected sig: $SIG"
          else
            echo "No sig file found — TAURI_SIGNING_PRIVATE_KEY may not be set"
          fi

      - name: Upload sig artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.platform-key }}
          path: ${{ runner.temp }}/sig/
          if-no-files-found: warn

  update-manifest:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all sig artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sig-*
          path: /tmp/sigs
          merge-multiple: false

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PLATFORMS_JSON=""

          for PLATFORM_KEY in darwin-aarch64 darwin-x86_64 linux-x86_64 windows-x86_64; do
            SIG_FILE="/tmp/sigs/sig-${PLATFORM_KEY}/${PLATFORM_KEY}.sig"
            NAME_FILE="/tmp/sigs/sig-${PLATFORM_KEY}/${PLATFORM_KEY}.name"

            if [ -f "$SIG_FILE" ] && [ -f "$NAME_FILE" ]; then
              SIG_CONTENT=$(cat "$SIG_FILE")
              INSTALLER_NAME=$(cat "$NAME_FILE")
              URL="https://github.com/${REPO}/releases/download/${TAG}/${INSTALLER_NAME}"

              ENTRY=$(jq -n --arg sig "$SIG_CONTENT" --arg url "$URL" \
                '{"signature": $sig, "url": $url}')

              [ -n "$PLATFORMS_JSON" ] && PLATFORMS_JSON="${PLATFORMS_JSON},"
              PLATFORMS_JSON="${PLATFORMS_JSON}\"${PLATFORM_KEY}\": ${ENTRY}"
            else
              echo "Skipping ${PLATFORM_KEY} — no sig artifact found"
            fi
          done

          jq -n \
            --arg version "$TAG" \
            --arg notes "See the release page for details." \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "{${PLATFORMS_JSON}}" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > /tmp/latest.json

          echo "Generated latest.json:"
          cat /tmp/latest.json

      - name: Upload latest.json to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" /tmp/latest.json --clobber --repo "${{ github.repository }}"
