name: Release

# Triggers:
#   - Push a git tag like "v1.2.3" → creates a GitHub Release with signed installers
#   - Manually via Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # macOS arm64 (Apple Silicon)
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
            artifact-pattern: 'src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg'
          - platform: macos-13            # macOS x64 (Intel)
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
            artifact-pattern: 'src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg'
          - platform: ubuntu-22.04        # Linux .AppImage + .deb
            args: ''
            rust-target: ''
            artifact-pattern: |
              src-tauri/target/release/bundle/**/*.AppImage
              src-tauri/target/release/bundle/**/*.deb
          - platform: windows-latest      # Windows .msi + .exe
            args: ''
            rust-target: ''
            artifact-pattern: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (Nx)
        run: npm exec nx build desktop -- --configuration=production

      - name: Build Tauri app (signed, macOS)
        if: runner.os == 'macOS' && secrets.APPLE_CERTIFICATE != ''
        run: npx tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri app (unsigned)
        if: runner.os != 'macOS' || secrets.APPLE_CERTIFICATE == ''
        run: npx tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Envello ${{ github.ref_name }}'
          body: |
            ## What's new
            See commits for details.

            ## Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `Envello_*_aarch64.dmg` |
            | macOS (Intel) | `Envello_*_x64.dmg` |
            | Windows | `Envello_*_x64-setup.exe` or `.msi` |
            | Linux | `Envello_*_amd64.AppImage` |
          draft: false
          prerelease: false
          files: ${{ matrix.artifact-pattern }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
