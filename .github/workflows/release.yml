name: Release

# Triggers:
#   - Push a git tag like "v1.2.3" → creates a GitHub Release with signed installers
#   - Manually via Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # macOS arm64 (Apple Silicon)
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: macos-13            # macOS x64 (Intel)
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04        # Linux .AppImage + .deb
            args: ''
            rust-target: ''
          - platform: windows-latest      # Windows .msi + .exe
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (Nx)
        run: npm exec nx build desktop -- --configuration=production

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- macOS code signing & notarization ---
          # Set these secrets in: Settings → Secrets → Actions
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}   # app-specific password from appleid.apple.com
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # --- Tauri updater signing ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        with:
          tagName: v__VERSION__
          releaseName: 'Envello v__VERSION__'
          releaseBody: |
            ## What's new
            See commits for details.

            ## Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `Envello_*_aarch64.dmg` |
            | macOS (Intel) | `Envello_*_x64.dmg` |
            | Windows | `Envello_*_x64-setup.exe` |
            | Linux | `Envello_*_amd64.AppImage` |
          releaseDraft: false
          prerelease: false
          projectPath: apps/desktop
          args: ${{ matrix.args }}
