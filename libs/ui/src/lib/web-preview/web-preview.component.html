@if (preview.isOpen()) {
  <div class="backdrop" (click)="close()"></div>

  <aside class="drawer">
    <header class="toolbar">
      <div class="site-info">
        <img
          class="favicon"
          [src]="faviconUrl()"
          alt=""
          width="16"
          height="16"
          (error)="$any($event.target).style.display='none'"
        />
        <div class="site-meta">
          <span class="site-title">{{ preview.title() }}</span>
          <span class="site-url">{{ displayUrl() }}</span>
        </div>
      </div>

      <div class="toolbar-actions">
        <button class="icon-btn" title="Reload" (click)="reload()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>

        @if (tauri.isTauri()) {
          <button class="icon-btn" title="Pop out to window" (click)="openInWindow()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <path d="M8 21h8M12 17v4"/>
            </svg>
          </button>
        } @else {
          <button class="icon-btn" title="Open in new tab" (click)="openExternal()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15,3 21,3 21,9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </button>
        }

        <button class="icon-btn close-btn" title="Close" (click)="close()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="iframe-wrap" #contentArea [class.iframe-wrap--tauri]="tauri.isTauri()">
      @if (loadState() === 'loading') {
        <div class="load-overlay">
          <div class="spinner"></div>
        </div>
      }

      @if (!tauri.isTauri()) {
        @if (loadState() === 'blocked') {
          <div class="blocked-state">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>
            <p>This site can't be previewed here.</p>
            <button class="open-btn" (click)="openExternal()">Open in browser</button>
          </div>
        } @else {
          <iframe
            #iframe
            [src]="safeUrl()"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            (load)="onIframeLoad()"
            title="Web preview"
          ></iframe>
        }
      }
    </div>
  </aside>
}
