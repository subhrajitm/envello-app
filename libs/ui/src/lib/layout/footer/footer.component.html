<footer class="footer" [class.footer--collapsed]="isCollapsed()">
  <button class="footer-collapse-btn" (click)="toggleCollapse()" [title]="isCollapsed() ? 'Expand status bar' : 'Collapse status bar'">
    <span class="material-symbols-outlined" style="font-size:14px;">{{ isCollapsed() ? 'expand_less' : 'expand_more' }}</span>
  </button>

  @if (!isCollapsed()) {
    <div class="footer-inner flex items-center justify-between gap-4">
      <div class="footer-item flex items-center gap-2">
        <span class="material-symbols-outlined footer-icon">local_fire_department</span>
        <span class="footer-label">STREAK:</span>
        <span class="footer-value">{{ currentStreak() }} Days</span>
        <div class="streak-indicators">
          <span class="streak-dot" [class.active]="streakIndicator(0)"></span>
          <span class="streak-dot" [class.active]="streakIndicator(1)"></span>
          <span class="streak-dot" [class.active]="streakIndicator(2)"></span>
          <span class="streak-dot" [class.active]="streakIndicator(3)"></span>
        </div>
      </div>
      <div class="footer-spacer"></div>
      <div class="footer-item footer-sync-item">
        <button
          class="footer-sync-btn"
          [class.footer-sync-btn--active]="isActivelySyncing() && !syncError()"
          [class.footer-sync-btn--error]="syncError()"
          [title]="syncError() ?? (isActivelySyncing() ? 'Syncing…' : 'Click to sync now')"
          [disabled]="isActivelySyncing()"
          (click)="triggerManualSync()"
          aria-label="Sync data"
        >
          <span class="material-symbols-outlined footer-sync-icon">
            {{ syncError() ? 'sync_problem' : 'sync' }}
          </span>
          <span class="footer-sync-label">
            @if (isActivelySyncing()) { Syncing… }
            @else if (syncError()) { Failed }
            @else { Synced }
          </span>
        </button>
      </div>
      <div class="footer-item footer-version" title="App version">v{{ appVersion() }}</div>
    </div>
  } @else {
    <div class="footer-collapsed-bar">
      <button
        class="footer-sync-btn footer-sync-btn--compact"
        [class.footer-sync-btn--active]="isActivelySyncing() && !syncError()"
        [class.footer-sync-btn--error]="syncError()"
        [title]="syncError() ?? (isActivelySyncing() ? 'Syncing…' : 'Click to sync now')"
        [disabled]="isActivelySyncing()"
        (click)="triggerManualSync()"
        aria-label="Sync data"
      >
        <span class="material-symbols-outlined footer-sync-icon">
          {{ syncError() ? 'sync_problem' : 'sync' }}
        </span>
      </button>
      <span class="footer-version-sm">v{{ appVersion() }}</span>
    </div>
  }
</footer>
