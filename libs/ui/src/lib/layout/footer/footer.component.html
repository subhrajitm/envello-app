<footer class="footer flex items-center justify-between gap-4">
  <div class="footer-item flex items-center gap-2">
    <span class="material-symbols-outlined footer-icon"
      >local_fire_department</span
    >
    <span class="footer-label">CURRENT STREAK:</span>
    <span class="footer-value">{{ currentStreak() }} Days</span>
    <div class="streak-indicators">
      <span class="streak-dot" [class.active]="streakIndicator(0)"></span>
      <span class="streak-dot" [class.active]="streakIndicator(1)"></span>
      <span class="streak-dot" [class.active]="streakIndicator(2)"></span>
      <span class="streak-dot" [class.active]="streakIndicator(3)"></span>
    </div>
  </div>
  <div class="footer-spacer"></div>
  <div class="footer-item flex items-center gap-2">
    <span class="material-symbols-outlined footer-icon">timer</span>
    <span class="footer-label">Session: {{ sessionDuration() }}</span>
  </div>
  <div class="footer-item footer-version" title="App version">
    v{{ appVersion() }}
  </div>
</footer>
