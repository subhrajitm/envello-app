<div class="ne-list-section">
    @if (showHeader()) {
    <div class="ne-chap-header">
        Characters
        <span class="material-symbols-outlined icon-add" (click)="addNewCharacter.emit()"
            title="Add new character">add</span>
    </div>
    }
    <div class="ne-simple-list">
        @for (char of characters(); track char.id) {
        <div class="ne-list-item" (click)="selectCharacter.emit(char.id)"
            [class.active]="selectedCharacterId() === char.id">
            <div class="ne-avatar-mini">
                <span class="material-symbols-outlined">account_circle</span>
            </div>
            <div class="list-info" (dblclick)="startRename(char, $event)">
                @if (renamingId() === char.id) {
                <input class="chap-rename-input" type="text"
                    [ngModel]="renameValue()"
                    (ngModelChange)="renameValue.set($event)"
                    (keydown.enter)="commitRename(char.id)"
                    (keydown.escape)="cancelRename()"
                    (blur)="commitRename(char.id)"
                    (click)="$event.stopPropagation()"
                    autofocus />
                } @else {
                <div class="list-title">{{ char.name }}</div>
                <div class="list-sub">{{ char.role }}</div>
                }
            </div>
            <span class="material-symbols-outlined list-delete"
                (click)="deleteCharacter.emit({ id: char.id, name: char.name }); $event.stopPropagation()"
                title="Delete character">delete</span>
        </div>
        } @empty {
        <div class="ne-list-empty">
            <span class="material-symbols-outlined">person_add</span>
            <span>No characters yet</span>
            <button class="ne-list-empty-btn" (click)="addNewCharacter.emit()">Add character</button>
        </div>
        }
    </div>
</div>
