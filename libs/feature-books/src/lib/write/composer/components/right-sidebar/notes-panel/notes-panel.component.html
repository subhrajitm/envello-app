<div class="ne-notes-panel">
    <div class="ne-ai-header">
        <span class="material-symbols-outlined icon-bolt">sticky_note_2</span>
        CHAPTER NOTES
        <button class="ne-panel-close" (click)="closed.emit()" title="Close">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <div class="ne-notes-list">
        <div class="ne-add-btn-row">
            <button class="ne-btn-add-note" (click)="addNewNote.emit()">
                <span class="material-symbols-outlined">add</span> New Note
            </button>
        </div>

        @for (note of notes(); track note.id) {
        <div class="ne-note-card">
            @if (editingNoteId() === note.id) {
            <div class="note-edit-form">
                <input class="note-edit-title" type="text" [ngModel]="editTitle()"
                    (ngModelChange)="editTitle.set($event)" placeholder="Note title"
                    (keydown.escape)="cancelEdit()" autofocus />
                <textarea class="note-edit-body" [ngModel]="editBody()"
                    (ngModelChange)="editBody.set($event)" placeholder="Note body"
                    rows="3" (keydown.escape)="cancelEdit()"></textarea>
                <div class="note-edit-actions">
                    <button class="note-edit-cancel" (click)="cancelEdit()">Cancel</button>
                    <button class="note-edit-save" (click)="commitEdit(note.id)"
                        [disabled]="!editTitle().trim()">Save</button>
                </div>
            </div>
            } @else {
            <div class="note-card-header">
                <span class="note-title">{{ note.title }}</span>
                <div class="note-actions">
                    <span class="note-time">{{ note.date }}</span>
                    <span class="material-symbols-outlined note-edit-btn" (click)="startEdit(note, $event)"
                        title="Edit note">edit</span>
                    <span class="material-symbols-outlined note-delete" (click)="deleteNote.emit(note.id)"
                        title="Delete note">delete</span>
                </div>
            </div>
            <div class="note-body">{{ note.body }}</div>
            }
        </div>
        }
    </div>
</div>
