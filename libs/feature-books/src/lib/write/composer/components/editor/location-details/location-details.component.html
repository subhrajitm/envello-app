<div class="ne-details-canvas">
    @if (location(); as loc) {
    <div class="ne-ent-card">

        <!-- ── HEADER ── -->
        <div class="ne-ent-hdr">
            <div class="ne-ent-icon-sq">
                <span class="material-symbols-outlined">map</span>
            </div>
            <div class="ne-ent-hdr-body">
                <input class="ne-ent-name-input" [value]="loc.name"
                    (input)="updateField.emit({ id: loc.id, field: 'name', value: $any($event.target).value })"
                    placeholder="Location Name" spellcheck="false" />
                <div class="ne-ent-hdr-meta">
                    <span class="ne-ent-type-pill">
                        <span class="material-symbols-outlined">location_on</span>
                        LOCATION
                    </span>
                    @if (loc.type) {
                    <span class="ne-ent-attr-chip">{{ loc.type }}</span>
                    }
                </div>
            </div>
        </div>

        <!-- ── GEOGRAPHY ── -->
        <div class="ne-ent-section">
            <div class="ne-ent-sec-hdr">
                <span class="material-symbols-outlined">terrain</span>
                GEOGRAPHY
            </div>
            <div class="ne-ent-props-grid">
                <div class="ne-ent-prop">
                    <label for="loc-type">LOCATION TYPE</label>
                    <input id="loc-type" type="text" [value]="loc.type"
                        (input)="updateField.emit({ id: loc.id, field: 'type', value: $any($event.target).value })"
                        placeholder="e.g. City, Wilderness, Space Station" />
                </div>
                <div class="ne-ent-prop">
                    <label for="loc-climate">CLIMATE / ATMOSPHERE</label>
                    <input id="loc-climate" type="text" [value]="loc.climate ?? ''"
                        (input)="updateField.emit({ id: loc.id, field: 'climate', value: $any($event.target).value })"
                        placeholder="e.g. Frozen tundra, Humid jungle" />
                </div>
                <div class="ne-ent-prop ne-ent-prop--full">
                    <label for="loc-significance">STORY SIGNIFICANCE</label>
                    <input id="loc-significance" type="text" [value]="loc.significance ?? ''"
                        (input)="updateField.emit({ id: loc.id, field: 'significance', value: $any($event.target).value })"
                        placeholder="e.g. Where the final confrontation takes place" />
                </div>
            </div>
        </div>

        <!-- ── DESCRIPTION & LORE ── -->
        <div class="ne-ent-section ne-ent-section--grow">
            <div class="ne-ent-sec-hdr">
                <span class="material-symbols-outlined">auto_stories</span>
                DESCRIPTION & LORE
            </div>
            <textarea class="ne-ent-prose" [value]="loc.description"
                (input)="updateField.emit({ id: loc.id, field: 'description', value: $any($event.target).value })"
                placeholder="Describe the atmosphere, history, and key features..."></textarea>
        </div>

    </div>
    } @else {
    <div class="ne-empty-state ne-empty-state--compact">
        <span class="material-symbols-outlined ne-empty-icon-sm">location_on</span>
        <p class="ne-empty-label">No location selected</p>
        <button class="ne-btn-ghost-sm" (click)="addNewLocation.emit()">
            <span class="material-symbols-outlined">add</span>
            New location
        </button>
    </div>
    }
</div>
