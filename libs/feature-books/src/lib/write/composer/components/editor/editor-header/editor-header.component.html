<div class="ne-editor-header">
    <div class="ne-editor-tabs">
        @for (tab of tabs(); track tab.id) {
        <button class="ne-editor-tab" [class.active]="activeNav() === tab.id"
            (click)="setActiveNav.emit(tab.id)">
            <span class="material-symbols-outlined tab-icon">{{ tab.icon }}</span>
            {{ tab.label }}
        </button>
        }
    </div>
    <div class="ne-editor-actions">
        <div class="undo-redo-group">
            <button class="action-btn"
                    (click)="performUndo.emit()"
                    [disabled]="!canUndo()"
                    title="Undo (⌘+Z)">
                <span class="material-symbols-outlined">undo</span>
            </button>
            <button class="action-btn"
                    (click)="performRedo.emit()"
                    [disabled]="!canRedo()"
                    title="Redo (⌘+Shift+Z)">
                <span class="material-symbols-outlined">redo</span>
            </button>
        </div>
    </div>
</div>
