@if (editor()) {
<div class="ne-editor-toolbar">
    <!-- Formatting Options -->
    <div class="toolbar-group">
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleBold().run()"
            [class.active]="editor().isActive('bold')" title="Bold">
            <span class="material-symbols-outlined">format_bold</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleItalic().run()"
            [class.active]="editor().isActive('italic')" title="Italic">
            <span class="material-symbols-outlined">format_italic</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleUnderline().run()"
            [class.active]="editor().isActive('underline')" title="Underline">
            <span class="material-symbols-outlined">format_underlined</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleStrike().run()"
            [class.active]="editor().isActive('strike')" title="Strikethrough">
            <span class="material-symbols-outlined">strikethrough_s</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleHighlight().run()"
            [class.active]="editor().isActive('highlight')" title="Highlight">
            <span class="material-symbols-outlined">ink_highlighter</span>
        </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="toolbar-btn" (click)="editor().chain().focus().setTextAlign('left').run()"
            [class.active]="editor().isActive({ textAlign: 'left' })" title="Align Left">
            <span class="material-symbols-outlined">format_align_left</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().setTextAlign('center').run()"
            [class.active]="editor().isActive({ textAlign: 'center' })" title="Align Center">
            <span class="material-symbols-outlined">format_align_center</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().setTextAlign('right').run()"
            [class.active]="editor().isActive({ textAlign: 'right' })" title="Align Right">
            <span class="material-symbols-outlined">format_align_right</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().setTextAlign('justify').run()"
            [class.active]="editor().isActive({ textAlign: 'justify' })" title="Justify">
            <span class="material-symbols-outlined">format_align_justify</span>
        </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleHeading({ level: 1 }).run()"
            [class.active]="editor().isActive('heading', { level: 1 })" title="H1">
            <span class="material-symbols-outlined">format_h1</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleHeading({ level: 2 }).run()"
            [class.active]="editor().isActive('heading', { level: 2 })" title="H2">
            <span class="material-symbols-outlined">format_h2</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleBulletList().run()"
            [class.active]="editor().isActive('bulletList')" title="Bullet list">
            <span class="material-symbols-outlined">format_list_bulleted</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleOrderedList().run()"
            [class.active]="editor().isActive('orderedList')" title="Numbered list">
            <span class="material-symbols-outlined">format_list_numbered</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleTaskList().run()"
            [class.active]="editor().isActive('taskList')" title="Checklist">
            <span class="material-symbols-outlined">check_box</span>
        </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleCodeBlock().run()"
            [class.active]="editor().isActive('codeBlock')" title="Code block">
            <span class="material-symbols-outlined">code</span>
        </button>
        <button class="toolbar-btn" (click)="editor().chain().focus().toggleBlockquote().run()"
            [class.active]="editor().isActive('blockquote')" title="Quote">
            <span class="material-symbols-outlined">format_quote</span>
        </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="toolbar-btn" (click)="openLinkModal.emit()" [class.active]="editor().isActive('link')" title="Link">
            <span class="material-symbols-outlined">link</span>
        </button>
        <button class="toolbar-btn" (click)="addImage.emit()" title="Image">
            <span class="material-symbols-outlined">image</span>
        </button>
        <button class="toolbar-btn" (click)="insertTable.emit()" title="Table">
            <span class="material-symbols-outlined">table</span>
        </button>
        <button class="toolbar-btn" (click)="addYoutube.emit()" title="YouTube">
            <span class="material-symbols-outlined">smart_display</span>
        </button>
    </div>
    @if (writingType() === 'POETRY') {
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="toolbar-btn" title="Stanza Break"
            (click)="editor().chain().focus().setHorizontalRule().run()">
            <span class="material-symbols-outlined">horizontal_rule</span>
        </button>
    </div>
    }
    @if (writingType() === 'SCRIPT') {
    <div class="toolbar-divider"></div>
    <div class="toolbar-group toolbar-group--script">
        <button class="toolbar-btn toolbar-btn--label" title="Scene Heading"
            (click)="editor().chain().focus().toggleHeading({ level: 2 }).run()"
            [class.active]="editor().isActive('heading', { level: 2 })">
            SCENE
        </button>
        <button class="toolbar-btn toolbar-btn--label" title="Dialogue"
            (click)="editor().chain().focus().toggleBlockquote().run()"
            [class.active]="editor().isActive('blockquote')">
            DLG
        </button>
    </div>
    }
    @if (writingType() === 'RESEARCH' || writingType() === 'ARTICLE' || writingType() === 'ESSAY') {
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <button class="toolbar-btn toolbar-btn--label" title="Footnote / Aside"
            (click)="editor().chain().focus().toggleBlockquote().run()"
            [class.active]="editor().isActive('blockquote')">
            FN
        </button>
    </div>
    }
</div>
}
