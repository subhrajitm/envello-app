<div class="ne-details-canvas">
    @if (character(); as c) {
    <div class="ne-ent-card">

        <!-- ── HEADER ── -->
        <div class="ne-ent-hdr ne-ent-hdr--char">
            <div class="ne-ent-monogram" [style.background]="avatarColor(c.name)">
                {{ (c.name[0] || '?').toUpperCase() }}
            </div>
            <div class="ne-ent-hdr-body">
                <input class="ne-ent-name-input" [value]="c.name"
                    (input)="updateField.emit({ id: c.id, field: 'name', value: $any($event.target).value })"
                    placeholder="Character Name" spellcheck="false" />
                <div class="ne-ent-hdr-meta">
                    <span class="ne-ent-type-pill">
                        <span class="material-symbols-outlined">person</span>
                        CHARACTER
                    </span>
                    @if (c.role) {
                    <span class="ne-ent-attr-chip">{{ c.role }}</span>
                    }
                    @if (c.archetype) {
                    <span class="ne-ent-attr-chip ne-ent-attr-chip--muted">{{ c.archetype }}</span>
                    }
                </div>
            </div>
        </div>

        <!-- ── PROFILE ATTRIBUTES ── -->
        <div class="ne-ent-section">
            <div class="ne-ent-sec-hdr">
                <span class="material-symbols-outlined">manage_accounts</span>
                PROFILE ATTRIBUTES
            </div>
            <div class="ne-ent-props-grid">
                <div class="ne-ent-prop">
                    <label for="char-role">ROLE IN STORY</label>
                    <input id="char-role" type="text" [value]="c.role"
                        (input)="updateField.emit({ id: c.id, field: 'role', value: $any($event.target).value })"
                        placeholder="e.g. Protagonist" />
                </div>
                <div class="ne-ent-prop">
                    <label for="char-archetype">ARCHETYPE</label>
                    <input id="char-archetype" type="text" [value]="c.archetype"
                        (input)="updateField.emit({ id: c.id, field: 'archetype', value: $any($event.target).value })"
                        placeholder="e.g. The Hero" />
                </div>
                <div class="ne-ent-prop">
                    <label for="char-age">AGE</label>
                    <input id="char-age" type="text" [value]="c.age ?? ''"
                        (input)="updateField.emit({ id: c.id, field: 'age', value: $any($event.target).value })"
                        placeholder="e.g. 32" />
                </div>
                <div class="ne-ent-prop">
                    <label for="char-motivation">MOTIVATION</label>
                    <input id="char-motivation" type="text" [value]="c.motivation ?? ''"
                        (input)="updateField.emit({ id: c.id, field: 'motivation', value: $any($event.target).value })"
                        placeholder="e.g. Avenge her family" />
                </div>
                <div class="ne-ent-prop">
                    <label for="char-flaw">FLAW</label>
                    <input id="char-flaw" type="text" [value]="c.flaw ?? ''"
                        (input)="updateField.emit({ id: c.id, field: 'flaw', value: $any($event.target).value })"
                        placeholder="e.g. Overconfident" />
                </div>
                <div class="ne-ent-prop">
                    <label for="char-arc">CHARACTER ARC</label>
                    <input id="char-arc" type="text" [value]="c.arc ?? ''"
                        (input)="updateField.emit({ id: c.id, field: 'arc', value: $any($event.target).value })"
                        placeholder="e.g. Learns to trust others" />
                </div>
            </div>
        </div>

        <!-- ── BIOGRAPHY ── -->
        <div class="ne-ent-section ne-ent-section--grow">
            <div class="ne-ent-sec-hdr">
                <span class="material-symbols-outlined">history_edu</span>
                BIOGRAPHY & NOTES
            </div>
            <textarea class="ne-ent-prose" [value]="c.description"
                (input)="updateField.emit({ id: c.id, field: 'description', value: $any($event.target).value })"
                placeholder="Describe their appearance, personality, and backstory..."></textarea>
        </div>

    </div>
    } @else {
    <div class="ne-empty-state ne-empty-state--compact">
        <span class="material-symbols-outlined ne-empty-icon-sm">group</span>
        <p class="ne-empty-label">No character selected</p>
        <button class="ne-btn-ghost-sm" (click)="addNewCharacter.emit()">
            <span class="material-symbols-outlined">add</span>
            New character
        </button>
    </div>
    }
</div>
