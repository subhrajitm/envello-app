<header class="header">
    <div class="header-top">
        <div class="logo">
            <span class="material-symbols-outlined logo-icon">nutrition</span>
            <span class="logo-text">ENVELLO</span>
        </div>
        <div class="header-search" (click)="openQuickFind()">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" placeholder="Quick find (Cmd + K)" class="search-input" readonly />
        </div>
        <div class="header-actions">
            <button class="btn-new-project" (click)="openAddNew()">
                <span class="material-symbols-outlined btn-icon-inner">add</span> <span>Add New</span>
            </button>
            <div class="divider-vertical"></div>
            <button class="icon-btn notification-btn" (click)="openNotifications()">
                <span class="material-symbols-outlined">notifications</span>
                @if (unreadCount() > 0) {
                <span class="notification-badge">{{ unreadCount() }}</span>
                }
            </button>
            <button class="icon-btn" (click)="toggleTheme()" [title]="'Switch to ' + getNextTheme() + ' Mode'">
                <span class="material-symbols-outlined">
                    {{ getThemeIcon() }}
                </span>
            </button>
            <button class="icon-btn" (click)="openSettings()">
                <span class="material-symbols-outlined">settings</span>
            </button>
            <div class="profile-menu" (click)="openProfileMenu()">
                <div class="profile-avatar">
                    <span class="avatar-text">{{ userInitials() }}</span>
                </div>
            </div>
        </div>
    </div>
    <nav class="header-nav">
        @for (tab of tabs; track tab) {
        <button class="nav-tab" [class.active]="activeTab === tab" (click)="navigateTo(tab)">
            {{ tab }}
        </button>
        }
    </nav>
</header>

<!-- Quick Find Modal -->
<app-quick-find></app-quick-find>

<!-- Add New Modal -->
<app-add-new-modal></app-add-new-modal>

<!-- Settings Modal -->
<app-settings-modal></app-settings-modal>

<!-- Notification Center -->
<app-notification-center></app-notification-center>

<!-- Profile Menu -->
<app-profile-menu (onOpenSettings)="handleOpenSettings()" (onOpenProfile)="handleOpenProfile()">
</app-profile-menu>
