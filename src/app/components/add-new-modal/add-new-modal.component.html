<div class="add-new-backdrop" *ngIf="isOpen()" (click)="onBackdropClick()">
    <div class="add-new-modal" (click)="onModalClick($event)">
        <!-- Header -->
        <div class="modal-header">
            <div class="header-content">
                <span class="material-symbols-outlined header-icon">add_circle</span>
                <h2>Create New</h2>
            </div>
            <button class="close-btn" (click)="close()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- Options Grid -->
        <div class="options-grid">
            @for (option of options; track option.id) {
            <div class="option-card" (click)="selectOption(option)">
                <div class="option-icon" [style.background-color]="option.color">
                    <span class="material-symbols-outlined">{{ option.icon }}</span>
                </div>
                <div class="option-content">
                    <div class="option-header">
                        <h3 class="option-title">{{ option.title }}</h3>
                        @if (option.count !== undefined) {
                        <span class="option-count">{{ option.count }}</span>
                        }
                    </div>
                    <p class="option-description">{{ option.description }}</p>
                </div>
                @if (option.shortcut) {
                <kbd class="shortcut-key">{{ option.shortcut }}</kbd>
                }
            </div>
            }
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <span class="footer-hint">
                Press shortcut key or <kbd>ESC</kbd> to close
            </span>
        </div>
    </div>
</div>
