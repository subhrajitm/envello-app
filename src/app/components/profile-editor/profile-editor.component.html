<div class="editor-overlay" *ngIf="isOpen()" (click)="close()">
    <div class="editor-modal" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Edit Profile</h2>
            <button class="close-btn" (click)="close()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <div class="modal-body">
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div class="current-avatar">
                    @if (tempAvatar) {
                    <img [src]="tempAvatar" alt="Profile Avatar">
                    } @else {
                    <span class="avatar-initials">{{ userInitials() }}</span>
                    }
                </div>
                <div class="avatar-actions">
                    <button class="btn-secondary" (click)="triggerFileInput()">
                        <span class="material-symbols-outlined">upload</span>
                        Change Photo
                    </button>
                    <button class="btn-text" (click)="removePhoto()">Remove</button>
                    <input type="file" #fileInput hidden (change)="onFileSelected($event)" accept="image/*">
                </div>
            </div>

            <!-- Form Fields -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" [(ngModel)]="tempName" class="form-input" placeholder="Your name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" [value]="user()?.email" class="form-input" disabled title="Email cannot be changed">
                <span class="field-hint">Email cannot be changed</span>
            </div>

            <div class="form-group">
                <label>Bio</label>
                <textarea [(ngModel)]="tempBio" class="form-textarea" placeholder="Tell us about yourself..."
                    rows="4"></textarea>
                <span class="char-count">{{ tempBio.length }}/200</span>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" (click)="close()">Cancel</button>
            <button class="btn-save" (click)="save()">Save Changes</button>
        </div>
    </div>
</div>
