<div class="project-oversight flex flex-col">
    <div class="section-header flex items-center justify-between">
        <div class="section-title flex items-center gap-2">
            <span class="material-symbols-outlined section-icon">list</span>
            PROJECT OVERSIGHT
        </div>
        <div class="section-controls flex items-center gap-2">
            <button class="control-btn">All Status</button>
            <button class="control-btn">
                Sort by: Last Updated <span class="material-symbols-outlined filter-icon">expand_more</span>
            </button>
            <button class="control-btn icon-only">
                <span class="material-symbols-outlined">search</span>
            </button>
        </div>
    </div>
    <div class="project-table">
        <div class="table-header">
            <div class="col-title">PROJECT TITLE</div>
            <div class="col-status">STATUS</div>
            <div class="col-words">WORDS</div>
            <div class="col-updated">UPDATED</div>
        </div>
        <div class="table-body">
            @for (project of projects(); track project.id) {
            <div class="table-row flex items-center">
                <div class="col-title">
                    <span class="material-symbols-outlined project-icon">{{ project.icon }}</span>
                    {{ project.title }}
                </div>
                <div class="col-status">
                    <span class="status-badge" [class]="getStatusColor(project.status)">
                        {{ project.status }}
                    </span>
                </div>
                <div class="col-words">{{ project.words }}</div>
                <div class="col-updated">{{ project.updated }}</div>
            </div>
            }
        </div>
    </div>
</div>
