<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Envello - Your Ideas, Accelerated.</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Distraction-free productivity and note-taking for creators.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Envello">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- Preconnect to Google Fonts for faster DNS + TLS handshake -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Critical fonts: Inter (UI), JetBrains Mono (code), Material Symbols (icons).
       Material Symbols axis pinned to exact values used by the app (opsz=20, wght=400, FILL=0, GRAD=0)
       instead of the full variable range — reduces icon font from ~1.5 MB to ~100 KB. -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap"
    rel="stylesheet" />
  <!-- Non-critical theme fonts loaded after page is interactive (only used in accessibility/writer themes) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Courier+Prime:wght@400;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  </noscript>
</head>

<body>
  <app-root></app-root>
</body>

</html>
