  <meta name="description" content="Distraction-free productivity and note-taking for creators.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Envello">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Sync theme from localStorage before first paint — prevents flash of wrong theme -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'light';
      var m = {
        'dark':             ['#09090b', '#ffd700', 'rgba(255,255,255,0.88)'],
        'enterprise-dark':  ['#18181b', '#fbbf24', 'rgba(250,250,250,0.88)'],
        'light':            ['#f7f7f5', '#b45309', '#0f0f0f'],
        'colorful':         ['#ffffff', '#f07d59', '#201d1d'],
        'typewriter':       ['#fdfbf7', '#000000', '#111111'],
        'enterprise-light': ['#fafafa', '#f59e0b', '#18181b']
      };
      var c = m[t] || m['dark'];
      var r = document.documentElement;
      r.setAttribute('data-theme', t);
      r.style.setProperty('--loader-bg',     c[0]);
      r.style.setProperty('--loader-accent', c[1]);
      r.style.setProperty('--loader-text',   c[2]);
    })();
  </script>

  <!-- Loader styles — inline in <head> so the loader renders correctly on first paint -->
  <style>
    #al {
      position: fixed;
      inset: 0;
      background: var(--loader-bg, #09090b);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #al.al-out {
      opacity: 0;
      pointer-events: none;
    }
    #al-logo {
      color: var(--loader-text, rgba(255,255,255,0.88));
      opacity: 0;
      transform: translateY(10px);
      animation: al-rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.05s forwards;
    }
    #al-logo svg {
      height: 28px;
      width: auto;
      display: block;
    }
    #al-sub {
      margin-top: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--loader-text, rgba(255,255,255,0.88));
      opacity: 0;
      animation: al-rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.22s forwards;
    }
    #al-track {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      overflow: hidden;
    }
    #al-bar {
      height: 100%;
      width: 0;
      background: var(--loader-accent, #ffd700);
      border-radius: 0 1px 1px 0;
      animation: al-prog 3.5s cubic-bezier(0.08, 0.4, 0.1, 1) 0.1s forwards;
      transition: width 0.28s ease;
    }
    @keyframes al-rise {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes al-prog {
      0%   { width: 0;   }
      15%  { width: 18%; }
      40%  { width: 42%; }
      70%  { width: 63%; }
      100% { width: 80%; }
    }
  </style>

  <!-- Preconnect to Google Fonts for faster DNS + TLS handshake -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Critical fonts: Inter (UI), JetBrains Mono (code), Material Symbols (icons).
       Material Symbols axis pinned to exact values used by the app (opsz=20, wght=400, FILL=0, GRAD=0)
       instead of the full variable range — reduces icon font from ~1.5 MB to ~100 KB. -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap"
    rel="stylesheet" />
  <!-- Non-critical theme fonts loaded after page is interactive (only used in accessibility/writer themes) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Courier+Prime:wght@400;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  </noscript>
