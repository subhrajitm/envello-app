  <!-- Sync theme from localStorage before first paint — prevents flash of wrong theme -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'light';
      var m = {
        'dark':             ['#0f0f0f', '#f5a623', 'rgba(232,232,232,0.88)'],
        'enterprise-dark':  ['#181818', '#e8a020', 'rgba(232,232,232,0.88)'],
        'light':            ['#f7f7f5', '#b45309', '#0f0f0f'],
        'typewriter':       ['#fdfbf7', '#000000', '#111111'],
      };
      var c = m[t] || m['dark'];
      var r = document.documentElement;
      r.setAttribute('data-theme', t);
      r.style.setProperty('--loader-bg',     c[0]);
      r.style.setProperty('--loader-accent', c[1]);
      r.style.setProperty('--loader-text',   c[2]);
    })();
  </script>

  <!-- Loader styles — inline in <head> so the loader renders correctly on first paint -->
  <style>
    #al {
      position: fixed;
      inset: 0;
      background: var(--loader-bg, #09090b);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #al.al-out {
      opacity: 0;
      pointer-events: none;
    }
    #al-logo {
      color: var(--loader-text, rgba(255,255,255,0.88));
      opacity: 0;
      transform: translateY(10px);
      animation: al-rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.05s forwards;
    }
    #al-logo svg {
      height: 28px;
      width: auto;
      display: block;
    }
    #al-sub {
      margin-top: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--loader-text, rgba(255,255,255,0.88));
      opacity: 0;
      animation: al-rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.22s forwards;
    }
    #al-track {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      overflow: hidden;
    }
    #al-bar {
      height: 100%;
      width: 0;
      background: var(--loader-accent, #ffd700);
      border-radius: 0 1px 1px 0;
      animation: al-prog 3.5s cubic-bezier(0.08, 0.4, 0.1, 1) 0.1s forwards;
      transition: width 0.28s ease;
    }
    @keyframes al-rise {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes al-prog {
      0%   { width: 0;   }
      15%  { width: 18%; }
      40%  { width: 42%; }
      70%  { width: 63%; }
      100% { width: 80%; }
    }
  </style>
