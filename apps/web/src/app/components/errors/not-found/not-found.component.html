<div class="nf-page">
  <div class="nf-content">

    <div class="nf-badge">404</div>

    <span class="material-symbols-outlined nf-icon">search_off</span>
    <h1 class="nf-title">Page not found</h1>
    <p class="nf-desc">
      <code class="nf-url">{{ attemptedUrl }}</code> doesn't exist or has been moved.
    </p>

    <a routerLink="/workspace" class="nf-primary-btn">
      <span class="material-symbols-outlined">home</span>
      Go to Workspace
    </a>

    <div class="nf-divider">
      <span>or jump to</span>
    </div>

    <div class="nf-quick-links">
      @for (link of quickLinks; track link.route) {
      <a [routerLink]="link.route" class="nf-quick-link">
        <span class="material-symbols-outlined">{{ link.icon }}</span>
        <span>{{ link.label }}</span>
      </a>
      }
    </div>

  </div>
</div>
