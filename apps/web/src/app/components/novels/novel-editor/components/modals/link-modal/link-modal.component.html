@if (isOpen()) {
<div class="ne-modal-overlay fixed inset-0 flex items-center justify-center z-[9999]" (click)="onCancel()">
    <div class="ne-modal flex flex-col rounded-lg shadow-xl" (click)="$event.stopPropagation()">
        <div class="ne-modal-header">
            Insert Link
        </div>
        <div class="ne-modal-body">
            <div class="ne-modal-input-wrapper">
                <label class="ne-modal-label">Link Text</label>
                <input 
                    type="text" 
                    class="ne-modal-input" 
                    [value]="linkText()"
                    (input)="linkTextChange.emit($any($event.target).value)"
                    placeholder="Link text (optional)"
                />
            </div>
            <div class="ne-modal-input-wrapper mt-4">
                <label class="ne-modal-label">URL</label>
                <input 
                    type="url" 
                    class="ne-modal-input" 
                    [value]="linkUrl()"
                    (input)="linkUrlChange.emit($any($event.target).value)"
                    placeholder="https://example.com"
                    (keydown.enter)="onInsert()"
                    autofocus
                />
            </div>
        </div>
        <div class="ne-modal-footer flex items-center justify-end gap-2">
            <button class="ne-modal-btn cancel" (click)="onCancel()">Cancel</button>
            <button class="ne-modal-btn confirm" (click)="onInsert()" [disabled]="!linkUrl().trim()">
                Insert
            </button>
        </div>
    </div>
</div>
}
