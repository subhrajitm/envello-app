@if (updateAvailable()) {
<div class="sw-update-banner">
  A new version is available.
  <button (click)="applyUpdate()">Reload to update</button>
</div>
}
<div class="dashboard">
  @if (!isFullScreen()) {
  <lib-header [activeTab]="currentTab()" [isImmersive]="isImmersive()"
    (sidebarCollapsedChange)="onSidebarCollapsedChange($event)">
  </lib-header>
  }

  <div class="dashboard-content" [class.no-padding]="hasSidebar() || isFullScreen()"
    [class.immersive-view]="isImmersive()"
    [class.with-sidebar]="!isImmersive() && !isFullScreen() && navigationLayout() !== 'horizontal'"
    [class.sidebar-collapsed]="sidebarCollapsed()" [class.horizontal-nav]="navigationLayout() === 'horizontal'"
    [class.fullscreen-content]="isFullScreen()">
    <router-outlet></router-outlet>
  </div>

  @if (!isFullScreen()) {
  <app-footer></app-footer>
  }
</div>
<!-- Keyboard shortcuts modal (? key) -->
<app-keyboard-shortcuts></app-keyboard-shortcuts>
<!-- Global toast notifications -->
<env-toast></env-toast>
<!-- In-app web preview drawer -->
<env-web-preview></env-web-preview>
