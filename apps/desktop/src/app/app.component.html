@if (authService.initialized()) {
<div class="dashboard">
  @if (!isFullScreen()) {
  <app-header [activeTab]="currentTab()" [isImmersive]="isImmersive()"
    (sidebarCollapsedChange)="onSidebarCollapsedChange($event)">
  </app-header>
  }

  <div class="dashboard-content" [class.no-padding]="hasSidebar() || isFullScreen()"
    [class.immersive-view]="isImmersive()"
    [class.with-sidebar]="!isImmersive() && !isFullScreen() && navigationLayout() !== 'horizontal'"
    [class.sidebar-collapsed]="sidebarCollapsed()" [class.horizontal-nav]="navigationLayout() === 'horizontal'"
    [class.fullscreen-content]="isFullScreen()">
    <router-outlet></router-outlet>
  </div>

  @if (!isFullScreen()) {
  <app-footer></app-footer>
  }
</div>
} @else {
<div class="app-splash-screen">
  <div class="splash-content">
    <span class="material-symbols-outlined splash-icon">nutrition</span>
    <h1 class="splash-title">ENVELLO</h1>
    <div class="splash-loader"></div>
  </div>
</div>
}
