<div class="voice-protocol-container">
    <!-- Top Bar -->
    <div class="vp-top-bar">
        <div class="vp-brand">
            <span class="status-dot"></span>
            <span class="brand-text">EXECUTIVE VOICE PROTOCOL</span>
        </div>
        <div class="vp-status">
            <span class="status-item">STUDIO GRADE</span>
            <span class="status-item active">
                <span class="status-breathe"></span>
                HYBRID ACTIVE
            </span>
            <button class="history-btn">
                <span class="material-symbols-outlined">history</span>
            </button>
        </div>
    </div>

    <!-- Main Center Content -->
    <div class="vp-center-stage">
        <div class="protocol-badge">
            <div class="audio-bars-mini">
                <span></span><span></span><span></span>
            </div>
            LIVE PROTOCOL
        </div>

        <div class="command-display">
            Create a new sprint retrospective for the
            <span class="highlight">&#64;design-team</span> and
            schedule it for <span class="highlight">#next-tuesday</span>.
        </div>

        <div class="waveform-visualizer">
            <!-- Simulated Waveform Bars -->
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar active"></div>
            <div class="bar active"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="refinement-input-wrapper">
            <input type="text" class="refinement-input" placeholder="Refine task details...">
            <span class="material-symbols-outlined input-icon">keyboard</span>
        </div>

        <div class="vp-actions">
            <button class="vp-btn primary" (click)="saveTask()">
                <span class="cmd-key">ENTER</span>
                SAVE TASK
            </button>
            <button class="vp-btn secondary" (click)="discardTask()">
                <span class="cmd-key">ESC</span>
                DISCARD
            </button>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="vp-bottom-bar">
        <div class="vp-meta-left">
            <span class="meta-label">CONFIDENCE</span>
            <span class="meta-value">98%</span>
            <div class="mini-chart">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="vp-meta-right">
            PROTOCOL ACTIVE
        </div>
    </div>

    <!-- Progress Line -->
    <div class="vp-progress-line"></div>
</div>
