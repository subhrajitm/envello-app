<div class="voice-protocol-container">
    <!-- Top Bar -->
    <div class="vp-top-bar">
        <div class="vp-brand">
            <span class="status-dot"></span>
            <span class="brand-text">EXECUTIVE VOICE PROTOCOL</span>
        </div>
        <div class="vp-dashboard-widgets">
            <button class="dashboard-widget-btn" (click)="router.navigate(['/projects'])">
                <div class="btn-content">
                    <span class="label">ACTIVE PROJECTS</span>
                    <span class="count">{{ store.projects().length }}</span>
                </div>
                <span class="material-symbols-outlined icon">dataset</span>
            </button>

            <button class="dashboard-widget-btn" (click)="router.navigate(['/activity-log'])">
                <div class="btn-content">
                    <span class="label">RECENT HISTORY</span>
                    <span class="count">LOG</span>
                </div>
                <span class="material-symbols-outlined icon">history</span>
            </button>
        </div>
    </div>

    <!-- Main Center Content -->
    <div class="vp-center-stage">
        <div class="protocol-badge" [class.recording]="listening()">
            <div class="audio-bars-mini">
                <span [class.active]="listening()"></span>
                <span [class.active]="listening()"></span>
                <span [class.active]="listening()"></span>
            </div>
            {{ listening() ? 'ON AIR' : 'LIVE PROTOCOL' }}
        </div>

        <div class="mic-section">
            <button class="mic-btn" [class.recording]="listening()" (click)="toggleVoice()">
                <span class="material-symbols-outlined" style="font-size: 28px;">
                    {{ listening() ? 'stop' : 'mic' }}
                </span>
            </button>
        </div>

        <div class="command-display">
            @if (liveTranscript()) {
            <span class="highlight">{{ liveTranscript() }}</span>
            } @else {
            {{ processedScript() }}
            }
        </div>

        <div class="waveform-visualizer">
            <!-- Simulated Waveform Bars -->
            <div class="bar" [class.active]="listening()"></div>
            <div class="bar" [class.active]="listening()"></div>
            <div class="bar" [class.active]="listening()"></div>
            <div class="bar" [class.active]="listening()"></div>
            <div class="bar" [class.active]="listening()"></div>
            <div class="bar" [class.active]="listening()"></div>
            <div class="bar" [class.active]="listening()"></div>
        </div>

        <div class="refinement-input-wrapper">
            <input type="text" class="refinement-input" placeholder="Refine task details..." [(ngModel)]="inputText">
            <span class="material-symbols-outlined input-icon">keyboard</span>
        </div>

        <div class="vp-actions">
            <button class="vp-btn primary" (click)="saveTask()">
                <span class="cmd-key">ENTER</span>
                SAVE TASK
            </button>
            <button class="vp-btn secondary" (click)="discardTask()">
                <span class="cmd-key">ESC</span>
                DISCARD
            </button>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="vp-bottom-bar">
        <div class="vp-meta-left">
            <span class="meta-label">CONFIDENCE</span>
            <span class="meta-value">{{ confidence() }}%</span>
            <div class="mini-chart">
                <span [style.height.%]="confidence()"></span>
                <span [style.height.%]="confidence()"></span>
                <span [style.height.%]="confidence()"></span>
            </div>
        </div>
        <div class="vp-meta-right">
            PROTOCOL ACTIVE
        </div>
    </div>

    <!-- Progress Line -->
    <div class="vp-progress-line"></div>
</div>
